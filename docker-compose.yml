services:
  ollama:
    image: ollama/ollama:latest
    container_name: fireform-ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - fireform-network
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fireform-app
    depends_on:
      ollama:
        condition: service_healthy
    # Fix #224 — expose port so API is reachable at http://localhost:8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      - CUDA_VISIBLE_DEVICES=""
      # Fix #118 #116 — correct PYTHONPATH to project root
      - PYTHONPATH=/app
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_TIMEOUT=300
    networks:
      - fireform-network

volumes:
  ollama_data:
    driver: local

networks:
  fireform-network:
    driver: bridge
